name: Deploy Docs

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Validate requested ref
        env:
          TARGET_REF: ${{ github.ref_name }}
        run: |
          case "${TARGET_REF}" in
            main|*.x)
              ;;
            *)
              echo "Only main and *.x branches can be published. Received: ${TARGET_REF}"
              exit 1
              ;;
          esac

      - name: Checkout source branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI documentation
        run: npm run build:api

      - name: Resolve target version
        id: version
        run: node scripts/resolve-version.js --github-output "$GITHUB_OUTPUT"

      - name: Resolve configured default branch
        id: default_branch
        run: node scripts/resolve-default-branch.js --github-output "$GITHUB_OUTPUT"

      - name: Prepare gh-pages workspace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            git clone --depth 1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" .gh-pages
          else
            mkdir -p .gh-pages
            cd .gh-pages
            git init
            git checkout --orphan gh-pages
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          fi

      - name: Build versions catalog
        id: catalog
        run: |
          mkdir -p .gh-pages/docs
          VERSION_CSV=$(node scripts/build-version-catalog.js .gh-pages/docs/versions.json "${{ steps.version.outputs.version_slug }}")
          echo "version_csv=${VERSION_CSV}" >> "$GITHUB_OUTPUT"

      - name: Build docs path manifest
        run: |
          node scripts/build-docs-path-manifest.js \
            .gh-pages/docs/doc-paths.json \
            docs \
            "${{ steps.version.outputs.version_slug }}"

      - name: Resolve site base
        id: site
        run: |
          if [ -f .gh-pages/CNAME ]; then
            DOMAIN=$(head -n 1 .gh-pages/CNAME | tr -d '[:space:]')
            echo "site_url=https://${DOMAIN}" >> "$GITHUB_OUTPUT"
            echo "site_base=/" >> "$GITHUB_OUTPUT"
          else
            OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            REPO_LC=$(echo "${REPO_NAME}" | tr '[:upper:]' '[:lower:]')
            echo "site_url=https://${GITHUB_REPOSITORY_OWNER}.github.io" >> "$GITHUB_OUTPUT"
            if [ "${REPO_LC}" = "${OWNER_LC}.github.io" ]; then
              echo "site_base=/" >> "$GITHUB_OUTPUT"
            else
              echo "site_base=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Resolve publish layout
        id: layout
        run: |
          node scripts/resolve-publish-layout.js \
            "${{ github.ref_name }}" \
            "${{ steps.default_branch.outputs.default_branch }}" \
            "${{ steps.site.outputs.site_base }}" \
            "${{ steps.version.outputs.version_slug }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Validate gh-pages workspace
        run: |
          if [ ! -d .gh-pages/.git ]; then
            echo "Expected .gh-pages to be an isolated git checkout"
            exit 1
          fi

      - name: Build Docusaurus site
        env:
          DOCS_CURRENT_BRANCH: ${{ github.ref_name }}
          DOCS_DEFAULT_BRANCH: ${{ steps.default_branch.outputs.default_branch }}
          DOCS_VERSION: ${{ steps.version.outputs.version_slug }}
          DOCS_VERSIONS: ${{ steps.catalog.outputs.version_csv }}
          DOCS_SITE_BASE: ${{ steps.site.outputs.site_base }}
          DOCS_BASE_URL: ${{ steps.layout.outputs.build_base_url }}
          DOCS_ROUTE_BASE_PATH: ${{ steps.layout.outputs.docs_route_base_path }}
          SITE_URL: ${{ steps.site.outputs.site_url }}
        run: npm run build

      - name: Publish default branch site ownership
        if: steps.layout.outputs.is_default_branch == 'true'
        run: |
          rm -rf "${{ steps.layout.outputs.versioned_docs_dir }}"

          rsync -a --delete \
            --exclude .git \
            --exclude '.git/***' \
            --exclude docs \
            --exclude 'docs/***' \
            --exclude CNAME \
            build/ .gh-pages/

          VERSION_EXCLUDES=$(printf '%s\n' "${{ steps.catalog.outputs.version_csv }}" | tr ',' '\n' | sed '/^$/d' | sed 's#^#--exclude=#')

          mkdir -p .gh-pages/docs
          rsync -a --delete \
            --exclude .git \
            --exclude '.git/***' \
            --exclude=versions.json \
            --exclude=doc-paths.json \
            ${VERSION_EXCLUDES} \
            build/docs/ .gh-pages/docs/

      - name: Publish non-default branch docs
        if: steps.layout.outputs.is_default_branch != 'true'
        run: |
          mkdir -p "${{ steps.layout.outputs.publish_target_dir }}"
          rsync -a --delete \
            --exclude .git \
            --exclude '.git/***' \
            "${{ steps.layout.outputs.publish_source_dir }}/" \
            "${{ steps.layout.outputs.publish_target_dir }}/"

      - name: Commit and push gh-pages
        working-directory: .gh-pages
        run: |
          if [ ! -d .git ]; then
            echo ".gh-pages git metadata is missing"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "chore: publish docs ${{ steps.version.outputs.version_slug }}"

          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git push origin HEAD:gh-pages
            exit 0
          fi

          ATTEMPT=1
          MAX_ATTEMPTS=3

          while [ "${ATTEMPT}" -le "${MAX_ATTEMPTS}" ]; do
            git fetch origin gh-pages

            if ! git rebase origin/gh-pages; then
              echo "Failed to rebase generated deploy commit onto origin/gh-pages"
              git rebase --abort || true
              exit 1
            fi

            if git push origin HEAD:gh-pages; then
              exit 0
            fi

            echo "Push race detected for gh-pages (attempt ${ATTEMPT}/${MAX_ATTEMPTS})"
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Failed to push gh-pages after ${MAX_ATTEMPTS} attempts"
          exit 1
